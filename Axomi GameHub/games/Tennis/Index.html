<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blox Tennis: Voxel Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Fredoka One', cursive; }
        canvas { display: block; }
        
        /* UI & Overlay */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
            padding: 20px; z-index: 10;
        }

        .hud-panel {
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px);
            border: 3px solid #fff; border-radius: 8px; color: #fff; padding: 12px 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); pointer-events: auto;
            text-shadow: 2px 2px 0 #000;
            display: flex; align-items: center; gap: 10px;
        }

        /* Zombie Toggle Switch */
        .switch {
            position: relative; display: inline-block; width: 50px; height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 34px;
            border: 2px solid #fff;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px;
            left: 4px; bottom: 2px; background-color: white;
            transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #22c55e; }
        input:checked + .slider:before { transform: translateX(22px); }

        .message-toast {
            position: absolute; top: 25%; left: 50%; transform: translate(-50%, -50%);
            font-size: 4rem; color: #fff; text-shadow: 4px 4px 0px #000;
            opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 20;
        }

        #power-bar-container {
            width: 350px; height: 24px; background: rgba(0,0,0,0.8);
            border: 3px solid #fff; border-radius: 20px; overflow: hidden;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
        #power-fill {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #facc15, #ef4444);
            transition: width 0.05s linear;
        }

        /* Start Overlay */
        #start-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.4);
            z-index: 50; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease; pointer-events: none;
        }
        .start-text {
            font-size: 4rem; color: #fff; text-shadow: 0 0 20px #000;
            animation: pulse 2s infinite;
        }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }

        .floater {
            position: absolute; font-weight: bold; font-size: 2rem; color: #fff;
            text-shadow: 2px 2px 0 #000; pointer-events: none;
            animation: floatUp 1s forwards; z-index: 30;
        }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-60px) scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

    <!-- Instructions Overlay -->
    <div id="start-overlay">
        <div class="text-center">
            <div class="start-text">PRESS SPACE TO SERVE</div>
        </div>
    </div>

    <!-- HUD -->
    <div class="ui-layer">
        <div class="flex justify-between items-start">
            <div class="hud-panel">
                <div class="text-[10px] uppercase text-gray-400 tracking-widest">Player</div>
                <div id="p1-score" class="text-6xl leading-none">0</div>
            </div>
            
            <!-- Zombie Toggle -->
            <div class="hud-panel flex-col !text-left">
                <div class="text-xs uppercase text-gray-300">ZOMBIE MODE</div>
                <label class="switch">
                    <input type="checkbox" id="zombie-toggle">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div id="center-msg" class="message-toast">SMASH!</div>
            
            <div class="hud-panel text-right">
                <div class="text-[10px] uppercase text-gray-400 tracking-widest">CPU Pro</div>
                <div id="p2-score" class="text-6xl leading-none">0</div>
            </div>
        </div>
        
        <div class="flex justify-center mb-16">
            <div class="flex flex-col items-center gap-2">
                <div class="text-white text-sm font-bold uppercase tracking-widest text-shadow">Power Charge</div>
                <div id="power-bar-container"><div id="power-fill"></div></div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG & STATE ---
        let scene, camera, renderer;
        let ball, player, cpu, net, court;
        let ballVel = new THREE.Vector3();
        let gameRunning = false;
        let score = {p1: 0, p2: 0};
        let keys = {};
        let p1Power = 0;
        let isCharging = false;
        let gameStartedOnce = false;
        
        // Zombie State
        let isZombie = false;
        
        // Entities
        let crowdMembers = [];
        let powerups = [];
        let particles = [];
        let activePowerup = null;
        let activeTimer = 0;
        let cameraTarget = new THREE.Vector3();

        const COURT_W = 28;
        const COURT_L = 54;
        const GRAVITY = 0.022;

        // --- VOXEL TEXTURE GENERATOR ---
        // Creates a texture that mimics the CSS linear-gradient shading
        function createVoxelTexture(lightColor, darkColor) {
            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            const ctx = canvas.getContext('2d');
            
            // Fill Light
            ctx.fillStyle = lightColor;
            ctx.fillRect(0, 0, 32, 32);
            
            // Fill Dark (Gradient simulation: Bottom-Right is darker)
            ctx.fillStyle = darkColor;
            ctx.beginPath();
            ctx.moveTo(32, 0);
            ctx.lineTo(32, 32);
            ctx.lineTo(0, 32);
            ctx.fill();
            
            // Add pixel noise for "retro" feel
            for(let i=0; i<20; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#ffffff' : '#000000';
                ctx.globalAlpha = 0.05;
                ctx.fillRect(Math.random()*32, Math.random()*32, 2, 2);
            }

            const tex = new THREE.CanvasTexture(canvas);
            tex.magFilter = THREE.NearestFilter; // Keeps it blocky/pixelated
            tex.minFilter = THREE.NearestFilter;
            return tex;
        }

        // --- PALETTES (Extracted from CSS) ---
        const PALETTES = {
            human: {
                skinLight: '#ffdbac', skinDark: '#d6b485',
                shirtLight: '#39c6ea', shirtDark: '#207d96', // Cyan shirt
                pantsLight: '#3b5f41', pantsDark: '#2a4430' // Dark pants
            },
            zombie: {
                skinLight: '#5c8a56', skinDark: '#3a5535', // Green skin
                shirtLight: '#5c8a56', shirtDark: '#3a5535', // Dirty shirt
                pantsLight: '#2a4430', pantsDark: '#1a2a20' // Ripped pants
            },
            teamBlue: { // Override for player to keep team color visible
                shirtLight: '#60a5fa', shirtDark: '#2563eb'
            },
            teamRed: { // Override for CPU
                shirtLight: '#f87171', shirtDark: '#ef4444'
            }
        };

        function getCharacterMat(isZombie, teamColor = null) {
            const p = isZombie ? PALETTES.zombie : PALETTES.human;
            const skin = createVoxelTexture(p.skinLight, p.skinDark);
            const shirt = teamColor ? createVoxelTexture(teamColor.light, teamColor.dark) : createVoxelTexture(p.shirtLight, p.shirtDark);
            const pants = createVoxelTexture(p.pantsLight, p.pantsDark);
            return { skin, shirt, pants };
        }

        // --- AUDIO ---
        let audioCtx;
        function initAudio() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playSound(type) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if(type === 'hit') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(450, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
            } else if (type === 'bounce') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(250, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.05);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.05);
                osc.start(); osc.stop(now + 0.05);
            } else if (type === 'powerup') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.linearRampToValueAtTime(800, now + 0.2);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            } else if (type === 'crowd') {
                const bufferSize = audioCtx.sampleRate * 0.1;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                const noiseGain = audioCtx.createGain();
                noiseGain.gain.value = 0.05;
                noise.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                noise.start();
            }
        }

        // --- MAIN INIT ---
        function startGame() {
            const overlay = document.getElementById('start-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('game-ui').style.display = 'flex';
            }, 500);
            initAudio();
            initThree();
            gameRunning = true;
            resetBall();
        }

        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1e293b);
            scene.fog = new THREE.Fog(0x1e293b, 30, 120);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 200);
            camera.position.set(0, 60, 60); // Start high
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Lighting
            const hemi = new THREE.HemisphereLight(0xffffff, 0x475569, 0.6);
            scene.add(hemi);
            const sun = new THREE.DirectionalLight(0xffffff, 0.9);
            sun.position.set(40, 80, 30);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048;
            sun.shadow.mapSize.height = 2048;
            scene.add(sun);

            const spot1 = new THREE.SpotLight(0xffffff, 0.6);
            spot1.position.set(-40, 40, 0);
            spot1.target.position.set(0,0,0);
            scene.add(spot1); scene.add(spot1.target);
            const spot2 = new THREE.SpotLight(0xffffff, 0.6);
            spot2.position.set(40, 40, 0);
            spot2.target.position.set(0,0,0);
            scene.add(spot2); scene.add(spot2.target);

            createStadium();
            createCourt();
            
            // Create Voxel Characters
            player = createVoxelCharacter(PALETTES.teamBlue, 20); // Player
            cpu = createVoxelCharacter(PALETTES.teamRed, -20); // CPU
            
            const ballGeo = new THREE.SphereGeometry(0.6, 16, 16);
            const ballMat = new THREE.MeshStandardMaterial({ color: 0xfacc15, roughness: 0.2 });
            ball = new THREE.Mesh(ballGeo, ballMat);
            ball.castShadow = true;
            scene.add(ball);

            resetBall();

            window.addEventListener('resize', onResize);
            window.addEventListener('keydown', e => { 
                keys[e.code] = true; 
                if(e.code === 'Space') {
                    if(!gameRunning) {
                        initAudio();
                        document.getElementById('start-overlay').style.opacity = '0';
                        serveBall();
                    }
                }
            });
            window.addEventListener('keyup', e => { 
                keys[e.code] = false; 
                if(e.code === 'Space' && isCharging) {
                    attemptHit();
                    isCharging = false;
                    p1Power = 0;
                    document.getElementById('power-fill').style.width = '0%';
                }
            });
            // Zombie Toggle
            document.getElementById('zombie-toggle').addEventListener('change', (e) => {
                isZombie = e.target.checked;
                updateCharacterSkins();
            });

            animate();
        }

        function createStadium() {
            const groundGeo = new THREE.PlaneGeometry(150, 150, 32, 32);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.8 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.5;
            ground.receiveShadow = true;
            scene.add(ground);

            const standMat = new THREE.MeshStandardMaterial({ color: 0x334155 });
            const standGeo = new THREE.BoxGeometry(120, 20, 30);
            const positions = [
                { x: 0, z: -80, rot: 0 }, { x: 0, z: 80, rot: 0 },
                { x: -80, z: 0, rot: Math.PI/2 }, { x: 80, z: 0, rot: Math.PI/2 }
            ];
            positions.forEach((pos, idx) => {
                const s = new THREE.Mesh(standGeo, standMat);
                s.position.set(pos.x, 8, pos.z);
                s.rotation.y = pos.rot;
                s.receiveShadow = true;
                scene.add(s);
                createCrowd(s.position, idx > 1, pos.rot);
            });
            [[-70,-70], [70,-70], [-70,70], [70,70]].forEach(pos => {
                const t = new THREE.Mesh(new THREE.BoxGeometry(2, 45, 2), new THREE.MeshStandardMaterial({ color: 0x94a3b8 }));
                t.position.set(pos[0], 22.5, pos[1]);
                t.castShadow = true;
                scene.add(t);
                const bulb = new THREE.Mesh(new THREE.BoxGeometry(6, 2, 6), new THREE.MeshBasicMaterial({ color: 0xfff7ed }));
                bulb.position.set(pos[0], 45, pos[1]);
                scene.add(bulb);
            });
        }

        function createCrowd(standPos, isRotated, rotY) {
            const colors = [0xff5555, 0x55ff55, 0x5555ff, 0xffff55];
            for(let i=0; i<100; i++) {
                const geo = new THREE.BoxGeometry(1.8, 1.8, 1.8);
                const mat = new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random()*colors.length)] });
                const blox = new THREE.Mesh(geo, mat);
                const ox = (Math.random() - 0.5) * (isRotated ? 15 : 80);
                const oz = (Math.random() - 0.5) * (isRotated ? 80 : 15);
                blox.position.set(standPos.x + (isRotated ? ox : 0), standPos.y + 10 + (Math.random()*5), standPos.z + (isRotated ? 0 : oz));
                blox.userData = { originY: blox.position.y, offset: Math.random() * 100, speed: 0.05 + Math.random()*0.05 };
                scene.add(blox);
                crowdMembers.push(blox);
            }
        }

        function createCourt() {
            const courtGeo = new THREE.BoxGeometry(COURT_W + 4, 0.5, COURT_L + 4);
            const courtMat = new THREE.MeshStandardMaterial({ color: 0x3b5f41, roughness: 0.4 });
            court = new THREE.Mesh(courtGeo, courtMat);
            court.receiveShadow = true;
            scene.add(court);

            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const addLine = (w, l, x, z) => {
                const g = new THREE.PlaneGeometry(w, l);
                const m = new THREE.Mesh(g, lineMat);
                m.rotation.x = -Math.PI/2;
                m.position.set(x, 0.26, z);
                scene.add(m);
            };
            addLine(COURT_W, 0.5, 0, 0);
            addLine(0.5, COURT_L, -COURT_W/2, 0);
            addLine(0.5, COURT_L, COURT_W/2, 0);

            const netGeo = new THREE.BoxGeometry(COURT_W, 2.5, 0.15);
            const netMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
            net = new THREE.Mesh(netGeo, netMat);
            net.position.y = 1.5;
            scene.add(net);

            [-1, 1].forEach(side => {
                const p = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 3.5), new THREE.MeshStandardMaterial({ color: 0x222, metalness: 0.8 }));
                p.position.set(side * (COURT_W/2 + 0.5), 1.75, 0);
                p.castShadow = true;
                scene.add(p);
            });
        }

        // --- VOXEL CHARACTER CREATOR ---
        // Matches the CSS proportions: Head 8, Torso 8x12, Arms 4x12, Legs 4x12
        function createVoxelCharacter(teamColor, zPos) {
            const group = new THREE.Group();
            const mats = getCharacterMat(isZombie, teamColor);
            const skinMat = new THREE.MeshStandardMaterial({ map: mats.skin, roughness: 1 });
            const shirtMat = new THREE.MeshStandardMaterial({ map: mats.shirt, roughness: 1 });
            const pantsMat = new THREE.MeshStandardMaterial({ map: mats.pants, roughness: 1 });

            const v = 1; // Unit scale factor

            // Head (8x8x8)
            const head = new THREE.Mesh(new THREE.BoxGeometry(2.2*v, 2.2*v, 2.2*v), skinMat);
            head.position.y = 5.5*v;
            head.castShadow = true;
            group.add(head);

            // Torso (8x12x4)
            const torso = new THREE.Mesh(new THREE.BoxGeometry(2.2*v, 3.2*v, 1.2*v), shirtMat);
            torso.position.y = 3.6*v;
            torso.castShadow = true;
            group.add(torso);

            // Arms (4x12x4)
            // Right Arm (with racket)
            const armRGroup = new THREE.Group();
            const armR = new THREE.Mesh(new THREE.BoxGeometry(0.8*v, 3.2*v, 0.8*v), shirtMat);
            armR.position.y = -1.6*v; // Pivot point
            armR.castShadow = true;
            armRGroup.add(armR);
            armRGroup.position.set(1.5*v, 4.2*v, 0.5*v);
            
            // Racket
            const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.1*v, 0.1*v, 1.5*v), new THREE.MeshStandardMaterial({color: 0x222, map: createVoxelTexture('#555', '#111')}));
            handle.rotation.x = Math.PI/2;
            const rim = new THREE.Mesh(new THREE.TorusGeometry(1*v, 0.1*v, 8, 16), new THREE.MeshStandardMaterial({color: 0xffffff, map: createVoxelTexture('#fff', '#ccc')}));
            rim.position.z = 1.2*v;
            handle.add(rim);
            armR.add(handle);
            
            group.add(armRGroup);

            // Left Arm
            const armLGroup = new THREE.Group();
            const armL = new THREE.Mesh(new THREE.BoxGeometry(0.8*v, 3.2*v, 0.8*v), shirtMat);
            armL.position.y = -1.6*v;
            armL.castShadow = true;
            armLGroup.add(armL);
            armLGroup.position.set(-1.5*v, 4.2*v, 0);
            group.add(armLGroup);

            // Legs (4x12x4)
            // Right Leg
            const legRGroup = new THREE.Group();
            const legR = new THREE.Mesh(new THREE.BoxGeometry(0.8*v, 3.2*v, 0.8*v), pantsMat);
            legR.position.y = -1.6*v;
            legR.castShadow = true;
            legRGroup.add(legR);
            legRGroup.position.set(0.4*v, 1.8*v, 0);
            group.add(legRGroup);

            // Left Leg
            const legLGroup = new THREE.Group();
            const legL = new THREE.Mesh(new THREE.BoxGeometry(0.8*v, 3.2*v, 0.8*v), pantsMat);
            legL.position.y = -1.6*v;
            legL.castShadow = true;
            legLGroup.add(legL);
            legLGroup.position.set(-0.4*v, 1.8*v, 0);
            group.add(legLGroup);

            group.position.set(0, 0, zPos);
            scene.add(group);

            return { 
                group, 
                armR: armRGroup, 
                armL: armLGroup, 
                legR: legRGroup, 
                legL: legLGroup, 
                mats // Store to update later
            };
        }

        function updateCharacterSkins() {
            // Get fresh materials based on new state
            const pMats = getCharacterMat(isZombie, PALETTES.teamBlue);
            const cMats = getCharacterMat(isZombie, PALETTES.teamRed);

            // Helper to traverse and update
            const updateMesh = (obj, mat) => {
                if(obj.type === 'Mesh' && obj.material.map) {
                    obj.material.map = mat;
                }
            };
            
            // Player Skins
            player.group.traverse((child) => {
                if(child.geometry) {
                    if(child.geometry.parameters.height === 2.2) child.material.map = pMats.skin; // Head
                    else if(child.geometry.parameters.width === 0.8 && child.geometry.parameters.height === 3.2) child.material.map = pMats.pants; // Legs
                    else if(child.geometry.parameters.height === 3.2 && child.geometry.parameters.depth === 1.2) child.material.map = pMats.shirt; // Torso
                    else if(child.geometry.parameters.width === 0.8 && child.geometry.parameters.depth === 0.8) child.material.map = pMats.shirt; // Arms
                }
            });
            player.materials = pMats;

            // CPU Skins
            cpu.group.traverse((child) => {
                if(child.geometry) {
                    if(child.geometry.parameters.height === 2.2) child.material.map = cMats.skin; 
                    else if(child.geometry.parameters.width === 0.8 && child.geometry.parameters.height === 3.2) child.material.map = cMats.pants; 
                    else if(child.geometry.parameters.height === 3.2 && child.geometry.parameters.depth === 1.2) child.material.map = cMats.shirt; 
                    else if(child.geometry.parameters.width === 0.8 && child.geometry.parameters.depth === 0.8) child.material.map = cMats.shirt; 
                }
            });
            cpu.materials = cMats;
        }

        function spawnPowerup() {
            if(powerups.length > 1) return;
            const types = [
                { name: 'SPEED', color: 0x00ffff, id: 'speed' },
                { name: 'BIG RACKET', color: 0xff00ff, id: 'big' },
                { name: 'FIREBALL', color: 0xff4500, id: 'fire' }
            ];
            const type = types[Math.floor(Math.random()*types.length)];
            const geo = new THREE.OctahedronGeometry(1.2);
            const mat = new THREE.MeshStandardMaterial({ 
                color: type.color, 
                emissive: type.color, 
                emissiveIntensity: 0.8 
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set((Math.random()-0.5)*14, 1.5, (Math.random()*12) + 4);
            mesh.userData = type;
            scene.add(mesh);
            powerups.push(mesh);
        }

        function activatePowerup(typeData) {
            activePowerup = typeData.id;
            activeTimer = 600;
            const msg = document.getElementById('center-msg');
            msg.innerText = typeData.name + "!";
            msg.style.color = '#' + typeData.color.toString(16);
            msg.style.opacity = '1';
            msg.style.fontSize = '3rem';
            playSound('powerup');
            if(typeData.id === 'big') {
                player.armR.scale.set(2, 2, 1);
                player.armR.position.z = 1.5;
            }
            setTimeout(() => { msg.style.opacity = '0'; msg.style.fontSize = '4rem'; }, 1500);
        }

        function spawnParticles(pos, color, count=8) {
            const geo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            const mat = new THREE.MeshBasicMaterial({ color: color });
            for(let i=0; i<count; i++) {
                const p = new THREE.Mesh(geo, mat);
                p.position.copy(pos);
                p.userData = { vel: new THREE.Vector3((Math.random()-0.5)*0.8, Math.random()*0.8, (Math.random()-0.5)*0.8), life: 1.0 };
                scene.add(p);
                particles.push(p);
            }
        }

        function serveBall() {
            if(gameRunning) return;
            const dir = ball.position.z > 0 ? -1 : 1;
            const force = 0.45 + (p1Power / 200);
            ballVel.set((Math.random()-0.5)*0.3, 0.45, force * dir);
            p1Power = 0;
            document.getElementById('power-fill').style.width = '0%';
            gameRunning = true;
            playSound('hit');
        }

        function resetBall() {
            if(score.p1 <= score.p2) ball.position.set(0, 2, 18);
            else ball.position.set(0, 2, -18);
            ballVel.set(0,0,0);
            gameRunning = false;
            if(ball.position.z > 0) document.getElementById('start-overlay').style.opacity = '1';
            else setTimeout(() => serveBall(), 1000);
        }

        // --- GAME LOGIC ---
        function update() {
            // Crowd Animation
            const time = Date.now() * 0.002;
            let cheering = gameRunning && Math.abs(ballVel.x) > 0.5;
            crowdMembers.forEach(m => {
                const amp = cheering ? 1.0 : 0.3;
                const jump = Math.sin(time * m.userData.speed + m.userData.offset) * amp;
                m.position.y = m.userData.originY + Math.max(0, jump);
            });
            if(cheering && Math.random() < 0.05) playSound('crowd');

            // Powerup Timer
            if(activeTimer > 0) {
                activeTimer--;
                if(activeTimer <= 0) {
                    activePowerup = null;
                    player.armR.scale.set(1, 1, 1);
                    player.armR.position.z = 0.5; // Reset pos
                }
            }

            if(!gameRunning) {
                if(keys['Space'] && ball.position.z > 0) {
                    isCharging = true;
                    p1Power = Math.min(100, p1Power + 2);
                    document.getElementById('power-fill').style.width = p1Power + '%';
                }
                return;
            }

            // 1. Player Move
            let moveSpeed = activePowerup === 'speed' ? 0.75 : 0.48;
            if(keys['KeyA'] || keys['ArrowLeft']) player.group.position.x -= moveSpeed;
            if(keys['KeyD'] || keys['ArrowRight']) player.group.position.x += moveSpeed;
            if(keys['KeyW'] || keys['ArrowUp']) player.group.position.z -= moveSpeed;
            if(keys['KeyS'] || keys['ArrowDown']) player.group.position.z += moveSpeed;

            player.group.position.x = Math.max(-COURT_W/2, Math.min(COURT_W/2, player.group.position.x));
            player.group.position.z = Math.max(2, Math.min(COURT_L/2, player.group.position.z));

            // 2. Power Charging
            if(keys['Space']) {
                isCharging = true;
                p1Power = Math.min(100, p1Power + 1);
                document.getElementById('power-fill').style.width = p1Power + '%';
            } else {
                isCharging = false;
            }

            // 3. AI Logic
            let aiSpeed = 0.38;
            if(ball.position.z < 0) {
                if(cpu.group.position.x < ball.position.x - 1) cpu.group.position.x += aiSpeed;
                else if(cpu.group.position.x > ball.position.x + 1) cpu.group.position.x -= aiSpeed;
                cpu.group.position.z = THREE.MathUtils.lerp(cpu.group.position.z, Math.min(-4, ball.position.z - 2), 0.04);
            } else {
                cpu.group.position.x *= 0.96;
                cpu.group.position.z = THREE.MathUtils.lerp(cpu.group.position.z, -20, 0.05);
            }

            // 4. Physics
            ball.position.add(ballVel);
            ballVel.y -= GRAVITY;

            if(ball.position.y < 0.7) {
                ball.position.y = 0.7;
                ballVel.y *= -0.82;
                ballVel.x *= 0.97; 
                if(Math.abs(ballVel.y) > 0.1) playSound('bounce');
                spawnParticles(ball.position, 0x3b5f41);
            }

            if(Math.abs(ball.position.x) > COURT_W/2) {
                ballVel.x *= -0.8;
                ball.position.x = Math.sign(ball.position.x) * COURT_W/2;
            }

            if(Math.abs(ball.position.z) < 0.6 && ball.position.y < 3) {
                ballVel.z *= -0.4;
                ballVel.y += 0.25;
                if(ball.position.z > 0) ball.position.z = 0.7;
                else ball.position.z = -0.7;
                playSound('hit');
                spawnParticles(ball.position, 0xffffff);
            }

            if(ball.position.z > COURT_L/2 + 3) {
                score.p2++;
                showFloatingText("CPU POINT", ball.position);
                resetBall();
            } else if(ball.position.z < -COURT_L/2 - 3) {
                score.p1++;
                playSound('crowd');
                showFloatingText("PLAYER POINT", ball.position);
                resetBall();
            }

            // 5. Hit Detection
            checkHit(player, 1);
            checkHit(cpu, -1);

            // 6. Powerups
            powerups.forEach((p, i) => {
                p.rotation.y += 0.05;
                p.rotation.x += 0.02;
                p.position.y = 1.5 + Math.sin(Date.now()*0.003)*0.5;
                if(player.group.position.distanceTo(p.position) < 3) {
                    activatePowerup(p.userData);
                    scene.remove(p);
                    powerups.splice(i, 1);
                } else if(ball.position.distanceTo(p.position) < 2) {
                    spawnParticles(p.position, p.userData.color, 15);
                    scene.remove(p);
                    powerups.splice(i, 1);
                }
            });

            if(Math.random() < 0.0015 && gameRunning) spawnPowerup();

            // Update Particles
            particles.forEach((p, i) => {
                p.position.add(p.userData.vel);
                p.userData.vel.y -= 0.03;
                p.userData.life -= 0.04;
                p.material.opacity = p.userData.life;
                if(p.userData.life <= 0) {
                    scene.remove(p);
                    particles.splice(i, 1);
                }
            });

            document.getElementById('p1-score').innerText = score.p1;
            document.getElementById('p2-score').innerText = score.p2;
        }

        function checkHit(char, dir) {
            const dist = ball.position.distanceTo(char.group.position);
            let hitbox = 4;
            if(char === player && activePowerup === 'big') hitbox = 7;

            if(dist < hitbox) {
                if(Math.sign(ballVel.z) === dir || (char === player && isCharging && Math.abs(ballVel.z) < 0.1)) {
                    let force = 0.65 + (p1Power/150);
                    if(activePowerup === 'fire') force = 1.6; 

                    ballVel.z = -dir * force;
                    ballVel.y = 0.55;
                    ballVel.x = (ball.position.x - char.group.position.x) * 0.25;
                    
                    spawnParticles(ball.position, char === player ? 0x3b82f6 : 0xef4444);
                    
                    // Swing Animation (Rotate Arm Group)
                    char.armR.rotation.x = -Math.PI/2;
                    char.armR.rotation.z = (Math.random()-0.5)*0.5; 
                    setTimeout(() => { 
                        char.armR.rotation.x = 0; 
                        char.armR.rotation.z = 0;
                    }, 150);
                    
                    playSound('hit');

                    if(char === player) {
                        p1Power = 0;
                        document.getElementById('power-fill').style.width = '0%';
                        if(activePowerup === 'fire' || p1Power > 95) {
                            const msg = document.getElementById('center-msg');
                            msg.innerText = "SUPER SMASH!";
                            msg.style.color = '#ff0000';
                            msg.style.opacity = '1';
                            document.body.classList.add('shake');
                            setTimeout(() => document.body.classList.remove('shake'), 400);
                        }
                    }
                }
            }
        }

        function showFloatingText(txt, pos) {
            const vec = pos.clone();
            vec.project(camera);
            const x = (vec.x * 0.5 + 0.5) * window.innerWidth;
            const y = (-(vec.y * 0.5) + 0.5) * window.innerHeight;
            const el = document.createElement('div');
            el.className = 'floater';
            el.innerText = txt;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        function onResize() {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            update();

            if(!gameStartedOnce) {
                camera.position.lerp(new THREE.Vector3(0, 25, 40), 0.03);
                if(camera.position.distanceTo(new THREE.Vector3(0,25,40)) < 0.5) gameStartedOnce = true;
                camera.lookAt(0,0,0);
            } else {
                const targetX = player.group.position.x * 0.3;
                camera.position.x += (targetX - camera.position.x) * 0.05;
                camera.lookAt(ball.position.x * 0.2, 2, ball.position.z * 0.1);
            }

            renderer.render(scene, camera);
        }

        // Immediate Start
        initThree();

    </script>
  <script src="../../game-helper.js"></script>
