<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Snake Game</title>
    <style>
        /* Styling the game area */
        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 5px solid #ecf0f1;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background-color: #000;
        }
        #ui {
            position: absolute;
            top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Snake Game</h1>
        <p>Score: <span id="score">0</span></p>
    </div>
    <canvas id="snakeGame" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        let score = 0;
        let gridSize = 20;
        let snake = [{x: 160, y: 160}, {x: 140, y: 160}, {x: 120, y: 160}];
        let dx = gridSize; // Horizontal velocity
        let dy = 0;        // Vertical velocity
        let foodX, foodY;

        // Initialize game
        createFood();
        main();

        // Game Loop
        function main() {
            if (didGameEnd()) {
                alert("Game Over! Final Score: " + score);
                document.location.reload();
                return;
            }

            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, 100); // Game speed (100ms)
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#2ecc71" : "#27ae60"; // Head is lighter green
                ctx.fillRect(part.x, part.y, gridSize - 2, gridSize - 2);
            });
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (head.x === foodX && head.y === foodY) {
                score += 10;
                scoreElement.innerHTML = score;
                createFood();
            } else {
                snake.pop();
            }
        }

        function didGameEnd() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x > canvas.width - gridSize;
            const hitTopWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y > canvas.height - gridSize;
            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall;
        }

        function createFood() {
            foodX = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
            foodY = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
        }

        function drawFood() {
            ctx.fillStyle = "#e74c3c"; // Red food
            ctx.fillRect(foodX, foodY, gridSize - 2, gridSize - 2);
        }

        // Controls
        document.addEventListener("keydown", (event) => {
            const keyPressed = event.keyCode;
            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            if (keyPressed === 37 && !goingRight) { dx = -gridSize; dy = 0; } // Left
            if (keyPressed === 38 && !goingDown) { dx = 0; dy = -gridSize; } // Up
            if (keyPressed === 39 && !goingLeft) { dx = gridSize; dy = 0; }  // Right
            if (keyPressed === 40 && !goingUp) { dx = 0; dy = gridSize; }   // Down
        });
    </script>
  <script src="../game-helper.js"></script>
</body>
</html>
