<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>HueForge · color palette studio</title>
  <!-- Google Fonts + Font Awesome 6 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0f1c;
      font-family: 'Inter', sans-serif;
      padding: 2rem 1.5rem;
      color: #f0f3fa;
    }

    .app-container {
      max-width: 1300px;
      margin: 0 auto;
    }

    /* header */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FFD3A5, #FD6585);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }
    .sub {
      color: #8f9bb3;
      margin-top: 6px;
    }

    /* palette grid */
    .palette-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .color-card {
      flex: 1;
      min-width: 160px;
      background: #151e2c;
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: 0 12px 28px -8px rgba(0,0,0,0.4);
      transition: transform 0.2s;
    }
    .color-card:hover {
      transform: translateY(-4px);
    }
    .color-preview {
      height: 160px;
      width: 100%;
      cursor: pointer;
      transition: 0.1s;
      position: relative;
    }
    .lock-overlay {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      border-radius: 30px;
      padding: 6px 10px;
      font-size: 0.7rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      z-index: 2;
    }
    .color-info {
      padding: 1rem;
      background: #0f1622;
    }
    .hex-code {
      font-family: monospace;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.5px;
      background: #1a2438;
      display: inline-block;
      padding: 4px 10px;
      border-radius: 30px;
    }
    .copy-hex {
      background: none;
      border: none;
      color: #8da3d0;
      margin-left: 8px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .lock-btn {
      background: rgba(255,255,240,0.1);
      border: none;
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      margin-top: 8px;
      width: 100%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .lock-btn.locked {
      background: #fd6585;
      color: white;
    }

    /* controls */
    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      margin: 1.5rem 0 2rem;
    }
    .btn {
      background: #1e2a3e;
      border: none;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: 600;
      color: #eaf2fc;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
    }
    .btn-primary {
      background: #3b6ea0;
    }
    .btn-primary:hover {
      background: #4d84bc;
      transform: scale(0.97);
    }
    .btn-secondary {
      background: #2c3e55;
    }
    .btn-secondary:hover {
      background: #3f5777;
    }

    /* palette history */
    .history-section {
      margin-top: 2rem;
      background: rgba(15, 22, 34, 0.6);
      border-radius: 1.6rem;
      padding: 1.2rem 1.5rem;
      backdrop-filter: blur(4px);
    }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .palette-history {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .history-item {
      width: 70px;
      height: 70px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 2px solid transparent;
      transition: 0.1s;
      background: #0f1622;
      gap: 4px;
    }
    .history-item:hover {
      border-color: #fd9a6e;
      transform: scale(1.02);
    }
    .history-colors {
      display: flex;
      width: 100%;
      height: 45px;
      border-radius: 12px;
      overflow: hidden;
    }
    .mini-color {
      flex: 1;
      height: 100%;
    }
    .empty-history {
      color: #6f85a5;
      padding: 1rem 0;
      text-align: center;
    }
    .toast-msg {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1f2e46;
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 0.8rem;
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
      z-index: 200;
      color: white;
    }
    @media (max-width: 700px) {
      .color-card {
        min-width: 130px;
      }
      .btn {
        padding: 8px 16px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1><i class="fas fa-palette"></i> HueForge</h1>
    <div class="sub">generate · lock · save · export color palettes</div>
  </div>

  <div class="palette-grid" id="paletteGrid"></div>

  <div class="controls">
    <button class="btn btn-primary" id="generateBtn"><i class="fas fa-sync-alt"></i> Generate new palette</button>
    <button class="btn btn-secondary" id="savePaletteBtn"><i class="fas fa-save"></i> Save current palette</button>
    <button class="btn btn-secondary" id="exportCssBtn"><i class="fas fa-code"></i> Export CSS</button>
  </div>

  <div class="history-section">
    <div class="history-header">
      <span><i class="fas fa-history"></i> Saved palettes</span>
      <button id="clearHistoryBtn" class="btn" style="background:#2a1e2e; padding:6px 14px;"><i class="fas fa-trash-alt"></i> Clear</button>
    </div>
    <div id="historyContainer" class="palette-history">
      <div class="empty-history">✨ No saved palettes yet. Click "Save current palette"</div>
    </div>
  </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
  // state: array of color objects { hex, locked }
  let currentPalette = [];
  const PALETTE_SIZE = 5;
  
  // saved palettes history (array of arrays of hex strings)
  let savedPalettes = [];

  // DOM elements
  const paletteGrid = document.getElementById('paletteGrid');
  const generateBtn = document.getElementById('generateBtn');
  const savePaletteBtn = document.getElementById('savePaletteBtn');
  const exportCssBtn = document.getElementById('exportCssBtn');
  const historyContainer = document.getElementById('historyContainer');
  const clearHistoryBtn = document.getElementById('clearHistoryBtn');
  const toastMsg = document.getElementById('toastMsg');
  
  // Helper: random hex color
  function randomHex() {
    const letters = '0123456789ABCDEF';
    let color = '#';
    for (let i = 0; i < 6; i++) {
      color += letters[Math.floor(Math.random() * 16)];
    }
    return color;
  }
  
  // generate harmonious random colors (not strictly harmonic but bright)
  function generateRandomColor() {
    return randomHex();
  }
  
  // generate entire palette respecting locks
  function generateNewPalette() {
    const newPalette = [];
    for (let i = 0; i < PALETTE_SIZE; i++) {
      if (currentPalette[i] && currentPalette[i].locked) {
        // keep locked color
        newPalette.push({ hex: currentPalette[i].hex, locked: true });
      } else {
        newPalette.push({ hex: generateRandomColor(), locked: false });
      }
    }
    currentPalette = newPalette;
    renderPalette();
  }
  
  // toggle lock on a specific color index
  function toggleLock(index) {
    if (currentPalette[index]) {
      currentPalette[index].locked = !currentPalette[index].locked;
      renderPalette();
      showToast(currentPalette[index].locked ? '🔒 Color locked' : '🔓 Color unlocked');
    }
  }
  
  // copy hex to clipboard
  async function copyHex(hex, index) {
    try {
      await navigator.clipboard.writeText(hex);
      showToast(`📋 ${hex} copied!`);
    } catch (err) {
      // fallback
      const textarea = document.createElement('textarea');
      textarea.value = hex;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      showToast(`📋 ${hex} copied!`);
    }
  }
  
  // render the color cards
  function renderPalette() {
    if (!paletteGrid) return;
    paletteGrid.innerHTML = '';
    for (let i = 0; i < currentPalette.length; i++) {
      const color = currentPalette[i];
      const hex = color.hex;
      const locked = color.locked;
      
      const card = document.createElement('div');
      card.className = 'color-card';
      
      const previewDiv = document.createElement('div');
      previewDiv.className = 'color-preview';
      previewDiv.style.backgroundColor = hex;
      previewDiv.setAttribute('data-index', i);
      // click on preview copies hex
      previewDiv.addEventListener('click', (e) => {
        e.stopPropagation();
        copyHex(hex, i);
      });
      
      // lock overlay inside preview
      const lockOverlay = document.createElement('div');
      lockOverlay.className = 'lock-overlay';
      lockOverlay.innerHTML = locked ? '<i class="fas fa-lock"></i> locked' : '<i class="fas fa-lock-open"></i> unlock';
      lockOverlay.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleLock(i);
      });
      previewDiv.appendChild(lockOverlay);
      
      const infoDiv = document.createElement('div');
      infoDiv.className = 'color-info';
      infoDiv.innerHTML = `
        <div>
          <span class="hex-code">${hex}</span>
          <button class="copy-hex" data-index="${i}"><i class="fas fa-copy"></i></button>
        </div>
        <button class="lock-btn ${locked ? 'locked' : ''}" data-index="${i}">
          <i class="fas ${locked ? 'fa-lock' : 'fa-lock-open'}"></i> ${locked ? 'Locked' : 'Lock'}
        </button>
      `;
      
      card.appendChild(previewDiv);
      card.appendChild(infoDiv);
      paletteGrid.appendChild(card);
    }
    
    // attach copy button events
    document.querySelectorAll('.copy-hex').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const idx = parseInt(btn.getAttribute('data-index'));
        if (!isNaN(idx) && currentPalette[idx]) {
          copyHex(currentPalette[idx].hex, idx);
        }
      });
    });
    // attach lock button events from info panel
    document.querySelectorAll('.lock-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const idx = parseInt(btn.getAttribute('data-index'));
        if (!isNaN(idx)) toggleLock(idx);
      });
    });
  }
  
  // Save current palette to history
  function saveCurrentPalette() {
    const hexArray = currentPalette.map(c => c.hex);
    // avoid duplicates? we can allow duplicates but for clarity let's check if identical exists? not mandatory
    savedPalettes.unshift(hexArray); // newest first
    // limit history to 12
    if (savedPalettes.length > 12) savedPalettes.pop();
    saveHistoryToLocal();
    renderHistory();
    showToast('💾 Palette saved!');
  }
  
  // render saved history thumbnails
  function renderHistory() {
    if (!historyContainer) return;
    if (savedPalettes.length === 0) {
      historyContainer.innerHTML = '<div class="empty-history">🎨 No saved palettes yet. Click "Save current palette"</div>';
      return;
    }
    let html = '';
    savedPalettes.forEach((palette, idx) => {
      const colorsHtml = palette.map(hex => `<div class="mini-color" style="background:${hex};"></div>`).join('');
      html += `
        <div class="history-item" data-history-index="${idx}">
          <div class="history-colors">${colorsHtml}</div>
          <div style="font-size:9px;">restore</div>
        </div>
      `;
    });
    historyContainer.innerHTML = html;
    // attach restore event
    document.querySelectorAll('.history-item').forEach(item => {
      item.addEventListener('click', (e) => {
        const idx = parseInt(item.getAttribute('data-history-index'));
        if (!isNaN(idx) && savedPalettes[idx]) {
          restorePaletteFromHistory(idx);
        }
      });
    });
  }
  
  function restorePaletteFromHistory(index) {
    const hexArray = savedPalettes[index];
    if (hexArray && hexArray.length === PALETTE_SIZE) {
      const newPalette = hexArray.map(hex => ({ hex, locked: false }));
      currentPalette = newPalette;
      renderPalette();
      showToast('🔄 Restored palette from history');
    }
  }
  
  function clearHistory() {
    savedPalettes = [];
    saveHistoryToLocal();
    renderHistory();
    showToast('🗑️ History cleared');
  }
  
  // Export current palette as CSS variables
  function exportAsCSS() {
    let css = `:root {\n`;
    currentPalette.forEach((color, i) => {
      css += `  --color-${i+1}: ${color.hex};\n`;
    });
    css += `}\n\n/* Example usage: color: var(--color-1); */`;
    // copy to clipboard
    navigator.clipboard.writeText(css).then(() => {
      showToast('📦 CSS variables copied!');
    }).catch(() => {
      // fallback
      const textarea = document.createElement('textarea');
      textarea.value = css;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      showToast('📦 CSS variables copied');
    });
  }
  
  // localStorage handling
  function saveHistoryToLocal() {
    localStorage.setItem('hueforge_palettes', JSON.stringify(savedPalettes));
  }
  
  function loadHistoryFromLocal() {
    const stored = localStorage.getItem('hueforge_palettes');
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        if (Array.isArray(parsed)) savedPalettes = parsed.slice(0, 12);
      } catch(e) {}
    }
    if (savedPalettes.length === 0) {
      // add two demo palettes?
      savedPalettes = [
        ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7'],
        ['#A8E6CF', '#FFD3B6', '#FFAAA5', '#FF8B94', '#C7CEE6']
      ];
      saveHistoryToLocal();
    }
    renderHistory();
  }
  
  // initialize first random palette
  function initRandomPalette() {
    const initial = [];
    for (let i = 0; i < PALETTE_SIZE; i++) {
      initial.push({ hex: generateRandomColor(), locked: false });
    }
    currentPalette = initial;
    renderPalette();
  }
  
  // show toast notification
  function showToast(msg, duration = 1600) {
    toastMsg.innerText = msg;
    toastMsg.style.opacity = '1';
    setTimeout(() => {
      toastMsg.style.opacity = '0';
    }, duration);
  }
  
  // event listeners
  generateBtn.addEventListener('click', () => {
    generateNewPalette();
  });
  savePaletteBtn.addEventListener('click', saveCurrentPalette);
  exportCssBtn.addEventListener('click', exportAsCSS);
  clearHistoryBtn.addEventListener('click', clearHistory);
  
  // load from local & start
  loadHistoryFromLocal();
  initRandomPalette();
  
  // extra: allow keyboard shortcut (space) to generate new palette
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && !e.target.matches('input, textarea, button')) {
      e.preventDefault();
      generateNewPalette();
      showToast('✨ New palette generated');
    }
  });
</script>
</body>
</html>
