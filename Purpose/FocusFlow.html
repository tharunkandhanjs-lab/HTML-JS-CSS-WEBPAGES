<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>FlowFocus · settable pomodoro + tasks</title>
  <!-- Google Fonts + Font Awesome 6 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a2639 0%, #2a3b4c 100%);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* main glass card */
    .focus-dashboard {
      max-width: 1150px;
      width: 100%;
      background: rgba(22, 32, 45, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    /* header with settings icon */
    .dashboard-header {
      display: flex;
      justify-content: flex-end;
      padding: 1rem 1.8rem 0;
    }
    .settings-icon {
      background: rgba(255,255,240,0.1);
      border: none;
      color: #cbe3fe;
      font-size: 1.3rem;
      cursor: pointer;
      width: 42px;
      height: 42px;
      border-radius: 40px;
      transition: 0.2s;
    }
    .settings-icon:hover {
      background: #3f6b8f;
      transform: rotate(15deg);
    }

    /* two column layout */
    .dashboard-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
    }

    .timer-section {
      flex: 1.4;
      padding: 0.5rem 1.8rem 2rem 1.8rem;
      background: rgba(18, 26, 36, 0.5);
      border-right: 1px solid rgba(255,255,240,0.08);
    }

    .tasks-section {
      flex: 1;
      padding: 1.5rem 1.5rem 2rem 1.5rem;
      background: rgba(12, 20, 28, 0.4);
    }

    @media (max-width: 780px) {
      .dashboard-grid {
        flex-direction: column;
      }
      .timer-section {
        border-right: none;
        border-bottom: 1px solid rgba(255,255,240,0.08);
      }
    }

    /* timer styles */
    .timer-header {
      text-align: center;
      margin-bottom: 1rem;
    }
    .timer-header h2 {
      color: #e9f1f7;
      font-weight: 600;
      letter-spacing: -0.2px;
      font-size: 1.6rem;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }
    .mode-badge {
      background: #2c4c6e;
      padding: 6px 16px;
      border-radius: 80px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #cae3f5;
      display: inline-block;
    }
    .timer-circle {
      background: #0f1a24;
      border-radius: 50%;
      width: 260px;
      height: 260px;
      margin: 1.5rem auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 35px -10px black, inset 0 1px 2px rgba(255,255,255,0.05);
      border: 2px solid #3e5e7c;
    }
    .timer-time {
      font-size: 4rem;
      font-weight: 800;
      font-family: monospace;
      letter-spacing: 5px;
      color: #f0f9ff;
      background: #07121c;
      padding: 0.2rem 1rem;
      border-radius: 60px;
    }
    .timer-label {
      font-size: 0.9rem;
      margin-top: 12px;
      color: #95adc7;
    }
    .timer-controls {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 24px 0 20px;
    }
    .ctrl-btn {
      background: #2c4053;
      border: none;
      width: 52px;
      height: 52px;
      border-radius: 60px;
      font-size: 1.3rem;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .ctrl-btn:hover {
      background: #3b5e7e;
      transform: scale(0.96);
    }
    .mode-switch {
      display: flex;
      gap: 12px;
      justify-content: center;
      background: #0e1a24a0;
      padding: 6px;
      border-radius: 60px;
      width: fit-content;
      margin: 0 auto;
    }
    .mode-btn {
      background: transparent;
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      color: #bdd4e8;
      cursor: pointer;
      transition: 0.2s;
    }
    .mode-btn.active {
      background: #2f6b9b;
      color: white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    /* tasks */
    .tasks-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .tasks-header h3 {
      color: #eef4fc;
      font-weight: 600;
    }
    .task-stats {
      background: #1c3346;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 500;
    }
    .add-task-form {
      display: flex;
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .add-task-form input {
      flex: 1;
      background: #0e1c28;
      border: 1px solid #2f4b64;
      padding: 12px 14px;
      border-radius: 40px;
      font-size: 0.9rem;
      color: white;
      outline: none;
    }
    .add-task-form input::placeholder {
      color: #6f8faa;
    }
    .add-task-form button {
      background: #2f6b9b;
      border: none;
      padding: 0 18px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .task-list {
      max-height: 380px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .task-item {
      background: rgba(20, 32, 44, 0.7);
      border-radius: 1.2rem;
      padding: 0.8rem 1rem;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid #2d4a66;
    }
    .task-check {
      width: 20px;
      height: 20px;
      accent-color: #4c9fcf;
      cursor: pointer;
    }
    .task-text {
      flex: 1;
      color: #eef2f8;
      font-weight: 500;
    }
    .task-item.completed .task-text {
      text-decoration: line-through;
      color: #7c9abe;
    }
    .delete-task {
      background: none;
      border: none;
      color: #748aa3;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 6px;
    }
    .empty-tasks {
      text-align: center;
      padding: 2rem;
      color: #7592ae;
    }
    .clear-tasks {
      margin-top: 1.4rem;
      text-align: right;
    }
    .clear-tasks button {
      background: #2e4257;
      border: none;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 0.7rem;
      color: #c2d6ec;
      cursor: pointer;
    }

    /* SETTINGS MODAL */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }
    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }
    .settings-modal {
      background: #1e2f3c;
      max-width: 450px;
      width: 90%;
      border-radius: 2rem;
      padding: 1.8rem;
      color: #eef4fc;
      box-shadow: 0 25px 40px black;
      border: 1px solid #497a9c;
    }
    .settings-modal h3 {
      font-size: 1.6rem;
      margin-bottom: 1rem;
      display: flex;
      gap: 10px;
    }
    .setting-group {
      margin-bottom: 1.2rem;
    }
    .setting-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: #bbd6f0;
    }
    .setting-group input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 40px;
      border: none;
      background: #0f212f;
      color: white;
      font-weight: 500;
      font-size: 1rem;
    }
    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 1.5rem;
      justify-content: flex-end;
    }
    .modal-buttons button {
      padding: 8px 20px;
      border-radius: 40px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    #saveSettingsBtn {
      background: #3f8ab3;
      color: white;
    }
    #closeSettingsBtn {
      background: #354f64;
      color: #e0ecf5;
    }
    .footer-note {
      text-align: center;
      font-size: 0.7rem;
      color: #6b8aa8;
      padding: 1rem;
      border-top: 1px solid rgba(255,255,240,0.05);
    }
  </style>
</head>
<body>
<div class="focus-dashboard">
  <div class="dashboard-header">
    <button class="settings-icon" id="openSettingsBtn"><i class="fas fa-sliders-h"></i></button>
  </div>
  <div class="dashboard-grid">
    <!-- LEFT: Timer -->
    <div class="timer-section">
      <div class="timer-header">
        <h2><i class="fas fa-hourglass-half"></i> FlowFocus</h2>
        <div class="mode-badge" id="currentModeBadge">🍅 Pomodoro</div>
      </div>
      <div class="timer-circle">
        <div class="timer-time" id="timerDisplay">25:00</div>
        <div class="timer-label" id="timerLabel">focus session</div>
      </div>
      <div class="timer-controls">
        <button class="ctrl-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
        <button class="ctrl-btn" id="resetTimerBtn"><i class="fas fa-undo-alt"></i></button>
      </div>
      <div class="mode-switch">
        <button class="mode-btn" data-mode="pomodoro">🍅 Pomodoro</button>
        <button class="mode-btn" data-mode="shortBreak">🌿 Short break</button>
        <button class="mode-btn" data-mode="longBreak">🌸 Long break</button>
      </div>
      <div class="sound-toggle" style="margin-top: 20px; text-align:center; font-size:0.75rem; color:#8aaec9;">
        <i class="fas fa-volume-up"></i> <span id="soundStatus">Sound on finish</span>
        <button id="soundToggleBtn" style="background:#1c3346; border:none; padding:6px 12px; border-radius:30px; margin-left:8px; color:white;">🔊 Mute</button>
      </div>
    </div>

    <!-- RIGHT: Tasks -->
    <div class="tasks-section">
      <div class="tasks-header">
        <h3><i class="fas fa-tasks"></i> focus tasks</h3>
        <div class="task-stats" id="taskStats">0/0 done</div>
      </div>
      <div class="add-task-form">
        <input type="text" id="taskInput" placeholder="e.g., Write proposal, Study ..." maxlength="70">
        <button id="addTaskBtn"><i class="fas fa-plus"></i> Add</button>
      </div>
      <div class="task-list" id="taskListContainer">
        <div class="empty-tasks">✨ Your tasks will appear here</div>
      </div>
      <div class="clear-tasks">
        <button id="clearCompletedTasksBtn"><i class="fas fa-trash-alt"></i> Clear completed</button>
      </div>
    </div>
  </div>
  <div class="footer-note">
    <i class="fas fa-cog"></i> Fully settable • durations & sound persist
  </div>
</div>

<!-- SETTINGS MODAL -->
<div id="settingsModal" class="modal-overlay">
  <div class="settings-modal">
    <h3><i class="fas fa-sliders-h"></i> Customize</h3>
    <div class="setting-group">
      <label>🍅 Pomodoro (minutes)</label>
      <input type="number" id="pomodoroMin" min="1" max="90" step="1">
    </div>
    <div class="setting-group">
      <label>🌿 Short break (minutes)</label>
      <input type="number" id="shortBreakMin" min="1" max="30" step="1">
    </div>
    <div class="setting-group">
      <label>🌸 Long break (minutes)</label>
      <input type="number" id="longBreakMin" min="1" max="45" step="1">
    </div>
    <div class="modal-buttons">
      <button id="closeSettingsBtn">Cancel</button>
      <button id="saveSettingsBtn">Save & Apply</button>
    </div>
  </div>
</div>

<script>
  // ---------- CUSTOM DURATIONS (persistent) ----------
  let customDurations = {
    pomodoro: 25,
    shortBreak: 5,
    longBreak: 15
  };

  // load saved durations from localStorage
  function loadDurations() {
    const saved = localStorage.getItem('flowfocus_durations');
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (parsed.pomodoro && parsed.shortBreak && parsed.longBreak) {
          customDurations = parsed;
        }
      } catch(e) {}
    }
    // update DOM inputs if modal exists
    const pomInput = document.getElementById('pomodoroMin');
    if (pomInput) pomInput.value = customDurations.pomodoro;
    const shortInput = document.getElementById('shortBreakMin');
    if (shortInput) shortInput.value = customDurations.shortBreak;
    const longInput = document.getElementById('longBreakMin');
    if (longInput) longInput.value = customDurations.longBreak;
  }

  function saveDurations() {
    localStorage.setItem('flowfocus_durations', JSON.stringify(customDurations));
  }

  // get seconds from custom durations
  function getDurationSeconds(mode) {
    if (mode === 'pomodoro') return customDurations.pomodoro * 60;
    if (mode === 'shortBreak') return customDurations.shortBreak * 60;
    return customDurations.longBreak * 60;
  }

  // ---------- TIMER MODULE ----------
  let timerState = {
    mode: 'pomodoro',
    timeLeft: getDurationSeconds('pomodoro'),
    isRunning: false,
    intervalId: null,
  };

  // DOM elements
  const timerDisplayEl = document.getElementById('timerDisplay');
  const timerLabelEl = document.getElementById('timerLabel');
  const currentModeBadge = document.getElementById('currentModeBadge');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const resetTimerBtn = document.getElementById('resetTimerBtn');
  const modeBtns = document.querySelectorAll('.mode-btn');
  const soundToggleBtn = document.getElementById('soundToggleBtn');
  const soundStatusSpan = document.getElementById('soundStatus');

  let soundEnabled = true;  // also persisted
  function loadSoundPref() {
    const savedSound = localStorage.getItem('flowfocus_sound');
    if (savedSound !== null) soundEnabled = savedSound === 'true';
    updateSoundUI();
  }
  function saveSoundPref() {
    localStorage.setItem('flowfocus_sound', soundEnabled);
  }
  function updateSoundUI() {
    if (soundEnabled) {
      soundToggleBtn.innerHTML = '🔊 Mute';
      soundStatusSpan.innerText = 'Sound on finish';
    } else {
      soundToggleBtn.innerHTML = '🔇 Unmute';
      soundStatusSpan.innerText = 'Sound off';
    }
  }
  function toggleSound() {
    soundEnabled = !soundEnabled;
    saveSoundPref();
    updateSoundUI();
  }

  function updateTimerDisplay() {
    const minutes = Math.floor(timerState.timeLeft / 60);
    const seconds = timerState.timeLeft % 60;
    timerDisplayEl.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
  }

  // refresh timer after duration change (without resetting if running)
  function refreshTimerDuration(resetIfIdle = true) {
    const newDuration = getDurationSeconds(timerState.mode);
    if (!timerState.isRunning && resetIfIdle) {
      timerState.timeLeft = newDuration;
    } else if (!timerState.isRunning) {
      // keep existing left but clamp? instead just keep
    }
    updateTimerDisplay();
  }

  function setMode(mode, keepRunning = false) {
    if (!['pomodoro', 'shortBreak', 'longBreak'].includes(mode)) return;
    timerState.mode = mode;
    if (!keepRunning) {
      timerState.timeLeft = getDurationSeconds(mode);
      timerState.isRunning = false;
      if (timerState.intervalId) {
        clearInterval(timerState.intervalId);
        timerState.intervalId = null;
      }
      updateTimerDisplay();
    }
    // update labels
    if (mode === 'pomodoro') {
      timerLabelEl.innerText = 'focus time · work';
      currentModeBadge.innerHTML = '🍅 Pomodoro';
    } else if (mode === 'shortBreak') {
      timerLabelEl.innerText = 'short rest · recharge';
      currentModeBadge.innerHTML = '🌿 Short break';
    } else {
      timerLabelEl.innerText = 'long break · stretch';
      currentModeBadge.innerHTML = '🌸 Long break';
    }
    modeBtns.forEach(btn => {
      if (btn.getAttribute('data-mode') === mode) btn.classList.add('active');
      else btn.classList.remove('active');
    });
  }

  function playFinishAlert() {
    if (soundEnabled) {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.frequency.value = 880;
        gainNode.gain.value = 0.3;
        oscillator.start();
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 1);
        oscillator.stop(audioCtx.currentTime + 0.8);
      } catch(e) {}
    }
    if (Notification.permission === 'granted') {
      const title = timerState.mode === 'pomodoro' ? '🍅 Focus complete! Take a break.' : '🌿 Break over — back to work!';
      new Notification('FlowFocus', { body: title });
    } else if (Notification.permission !== 'denied') {
      Notification.requestPermission();
    }
  }

  function timerTick() {
    if (timerState.timeLeft <= 1) {
      timerState.isRunning = false;
      if (timerState.intervalId) {
        clearInterval(timerState.intervalId);
        timerState.intervalId = null;
      }
      playFinishAlert();
      timerState.timeLeft = getDurationSeconds(timerState.mode);
      updateTimerDisplay();
      const playIcon = playPauseBtn.querySelector('i');
      if (playIcon) playIcon.className = 'fas fa-play';
    } else {
      timerState.timeLeft--;
      updateTimerDisplay();
    }
  }

  function startTimer() {
    if (timerState.intervalId) clearInterval(timerState.intervalId);
    timerState.isRunning = true;
    timerState.intervalId = setInterval(() => {
      timerTick();
      if (!timerState.isRunning && timerState.intervalId) {
        if (timerState.timeLeft === getDurationSeconds(timerState.mode)) {
          if (timerState.intervalId) clearInterval(timerState.intervalId);
          timerState.intervalId = null;
        }
      }
    }, 1000);
  }

  function pauseTimer() {
    if (timerState.intervalId) {
      clearInterval(timerState.intervalId);
      timerState.intervalId = null;
    }
    timerState.isRunning = false;
  }

  function resetTimer() {
    pauseTimer();
    timerState.timeLeft = getDurationSeconds(timerState.mode);
    updateTimerDisplay();
    const icon = playPauseBtn.querySelector('i');
    icon.className = 'fas fa-play';
  }

  function togglePlayPause() {
    if (timerState.isRunning) {
      pauseTimer();
      playPauseBtn.querySelector('i').className = 'fas fa-play';
    } else {
      startTimer();
      playPauseBtn.querySelector('i').className = 'fas fa-pause';
    }
  }

  // ---------- TASKS MODULE ----------
  let tasks = [];
  const taskInput = document.getElementById('taskInput');
  const addTaskBtn = document.getElementById('addTaskBtn');
  const taskListContainer = document.getElementById('taskListContainer');
  const taskStatsSpan = document.getElementById('taskStats');
  const clearCompletedTasksBtn = document.getElementById('clearCompletedTasksBtn');

  function saveTasksToLocal() {
    localStorage.setItem('flowfocus_tasks', JSON.stringify(tasks));
  }

  function loadTasks() {
    const stored = localStorage.getItem('flowfocus_tasks');
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        if (Array.isArray(parsed)) tasks = parsed;
        else tasks = [];
      } catch(e) { tasks = []; }
    }
    
  }

  function updateTaskStats() {
    const total = tasks.length;
    const done = tasks.filter(t => t.completed).length;
    taskStatsSpan.innerText = `${done}/${total} done`;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
  }

  function renderTasks() {
    if (!tasks.length) {
      taskListContainer.innerHTML = `<div class="empty-tasks"><i class="far fa-smile"></i> No tasks — add some!</div>`;
      updateTaskStats();
      return;
    }
    let html = '';
    tasks.forEach(task => {
      const completedClass = task.completed ? 'completed' : '';
      html += `
        <div class="task-item ${completedClass}" data-task-id="${task.id}">
          <input type="checkbox" class="task-check" ${task.completed ? 'checked' : ''} data-id="${task.id}">
          <span class="task-text">${escapeHtml(task.text)}</span>
          <button class="delete-task" data-id="${task.id}"><i class="fas fa-trash-alt"></i></button>
        </div>
      `;
    });
    taskListContainer.innerHTML = html;
    updateTaskStats();
  }

  function addNewTask() {
    const text = taskInput.value.trim();
    if (text === '') return;
    tasks.push({ id: Date.now(), text, completed: false });
    saveTasksToLocal();
    renderTasks();
    taskInput.value = '';
  }

  function toggleTaskCompletion(taskId) {
    const task = tasks.find(t => t.id === taskId);
    if (task) { task.completed = !task.completed; saveTasksToLocal(); renderTasks(); }
  }

  function deleteTaskById(taskId) {
    tasks = tasks.filter(t => t.id !== taskId);
    saveTasksToLocal();
    renderTasks();
  }

  function clearCompletedTasks() {
    tasks = tasks.filter(t => !t.completed);
    saveTasksToLocal();
    renderTasks();
  }

  function handleTaskContainerClick(e) {
    const checkbox = e.target.closest('.task-check');
    if (checkbox && checkbox.dataset.id) { toggleTaskCompletion(Number(checkbox.dataset.id)); return; }
    const delBtn = e.target.closest('.delete-task');
    if (delBtn && delBtn.dataset.id) { deleteTaskById(Number(delBtn.dataset.id)); return; }
  }

  // ---------- SETTINGS MODAL LOGIC ----------
  const modal = document.getElementById('settingsModal');
  const openBtn = document.getElementById('openSettingsBtn');
  const closeBtn = document.getElementById('closeSettingsBtn');
  const saveSettingsBtn = document.getElementById('saveSettingsBtn');
  const pomodoroInput = document.getElementById('pomodoroMin');
  const shortBreakInput = document.getElementById('shortBreakMin');
  const longBreakInput = document.getElementById('longBreakMin');

  function applySettingsAndClose() {
    let newPomo = parseInt(pomodoroInput.value, 10);
    let newShort = parseInt(shortBreakInput.value, 10);
    let newLong = parseInt(longBreakInput.value, 10);
    if (isNaN(newPomo)) newPomo = 25;
    if (isNaN(newShort)) newShort = 5;
    if (isNaN(newLong)) newLong = 15;
    newPomo = Math.min(90, Math.max(1, newPomo));
    newShort = Math.min(30, Math.max(1, newShort));
    newLong = Math.min(45, Math.max(1, newLong));
    
    customDurations = {
      pomodoro: newPomo,
      shortBreak: newShort,
      longBreak: newLong
    };
    saveDurations();
    
    // update timer if current mode's duration changed
    const wasRunning = timerState.isRunning;
    if (wasRunning) pauseTimer();
    const oldSeconds = timerState.timeLeft;
    const newMax = getDurationSeconds(timerState.mode);
    // if time left is bigger than new max or just reset to avoid odd states
    if (oldSeconds > newMax || !wasRunning) {
      timerState.timeLeft = newMax;
    }
    updateTimerDisplay();
    if (wasRunning) startTimer();
    // ensure UI refresh
    setMode(timerState.mode, true);
    modal.classList.remove('active');
  }

  openBtn.addEventListener('click', () => {
    // populate current values
    pomodoroInput.value = customDurations.pomodoro;
    shortBreakInput.value = customDurations.shortBreak;
    longBreakInput.value = customDurations.longBreak;
    modal.classList.add('active');
  });
  closeBtn.addEventListener('click', () => modal.classList.remove('active'));
  saveSettingsBtn.addEventListener('click', applySettingsAndClose);
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

  // ---------- INITIALIZE ----------
  function init() {
    loadDurations();
    loadSoundPref();
    loadTasks();
    renderTasks();
    // set timer with custom durations
    timerState.timeLeft = getDurationSeconds('pomodoro');
    setMode('pomodoro', false);
    updateTimerDisplay();
    playPauseBtn.addEventListener('click', togglePlayPause);
    resetTimerBtn.addEventListener('click', resetTimer);
    addTaskBtn.addEventListener('click', addNewTask);
    taskInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addNewTask(); });
    clearCompletedTasksBtn.addEventListener('click', clearCompletedTasks);
    taskListContainer.addEventListener('click', handleTaskContainerClick);
    soundToggleBtn.addEventListener('click', toggleSound);
    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const mode = btn.getAttribute('data-mode');
        if (timerState.isRunning) pauseTimer();
        setMode(mode, false);
        playPauseBtn.querySelector('i').className = 'fas fa-play';
      });
    });
    if (Notification.permission === 'default') Notification.requestPermission();
  }
  init();
</script>
</body>
</html>
